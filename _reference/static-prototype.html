<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hydracaddie Hydration Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56443PIS3DOrSCbgdcNtDnuG" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-d6yCHBWJXzPXPBGiqmSMbMkMj7cRpIE6+F6ZXeHg0MpkAdyYKe7MVWqooBJt1U9" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1A7A3C;
      --green-dark: #155F2E;
      --green-mid: #2A9B52;
      --green-light: #EAF4EE;
      --green-xlight: #F4FAF6;
      --cream: #FAFAF8;
      --text: #141414;
      --muted: #6B7280;
      --border: #E2E8E4;
      --white: #FFFFFF;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-enter { animation: fadeSlideIn 0.38s cubic-bezier(.22,.68,0,1.2) both; }

    @keyframes fadeSlideInRight {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-right { animation: fadeSlideInRight 0.3s cubic-bezier(.22,.68,0,1.2) both; }

    @keyframes fadeSlideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-left { animation: fadeSlideInLeft 0.3s cubic-bezier(.22,.68,0,1.2) both; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(26,122,60,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(26,122,60,0); }
    }

    @keyframes sachBounce {
      0%   { transform: scale(0.7) rotate(-5deg); opacity: 0; }
      60%  { transform: scale(1.08) rotate(1deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); }
    }
    .sach-bounce { animation: sachBounce 0.5s cubic-bezier(.22,.68,0,1.2) both; }

    .hcp-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    .hcp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1A7A3C;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      cursor: pointer;
    }
    .hcp-slider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1A7A3C;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SOCIAL_PROOF_COUNT = 2400;
const CTA_LABEL = 'Get your sachets →';

const G = {
  green: '#1A7A3C',
  greenDark: '#155F2E',
  greenMid: '#2A9B52',
  greenLight: '#EAF4EE',
  greenXLight: '#F4FAF6',
  cream: '#FAFAF8',
  text: '#141414',
  muted: '#6B7280',
  border: '#E2E8E4',
  white: '#FFFFFF',
};

/* ─── Calculation engine (Galpin-based) ─── */
// answers: [0]holes [1]mode [2]duration [3]weather [4]sweat [5]weight [6]handicap
function calcPlan(answers) {
  const holesMap    = { '9 holes': 2.5, '18 holes': 4.5 };
  const durationMap = { 'Around 3 hours': 3, 'Around 4 hours': 4, '5 hours or more': 5.5 };
  const modeBase    = { 'Walking': 520, 'Buggy': 310 };
  const tempMult    = { 'Cool (under 15°C)': 0.8, 'Mild (15-22°C)': 1.0, 'Warm (22-28°C)': 1.3, 'Hot (28°C+)': 1.65 };
  const sweatMult   = { 'Barely break a sweat': 0.8, 'Damp shirt by the back nine': 1.05, 'Soaked through, often': 1.4 };
  const weightFact  = { '60kg or below': 0.72, '60-70kg': 0.82, '70-80kg': 0.95, '80-90kg': 1.05, '90-100kg': 1.15, 'Over 100kg': 1.3 };
  const weightFactLbs = { '132lbs or below': 0.72, '132-154lbs': 0.82, '154-176lbs': 0.95, '176-198lbs': 1.05, '198-220lbs': 1.15, 'Over 220lbs': 1.3 };

  const holesHours = holesMap[answers[0]] || 4.5;
  const durHours   = durationMap[answers[2]];
  const hours      = durHours || holesHours;
  const base       = modeBase[answers[1]]  || 400;
  const tMult      = tempMult[answers[3]]  || 1.0;
  const sMult      = sweatMult[answers[4]] || 1.0;
  const wFact      = (answers[5] && answers[5].includes('lbs'))
    ? (weightFactLbs[answers[5]] || 1.0)
    : (weightFact[answers[5]]    || 1.0);

  const sweatRatePerHour = base * tMult * sMult * wFact;
  const totalFluid = Math.round((sweatRatePerHour * hours) / 50) * 50;

  const sodiumLow  = Math.round(totalFluid * 0.55);
  const sodiumHigh = Math.round(totalFluid * 0.75);
  const potassLow  = Math.round(totalFluid * 0.18);
  const potassHigh = Math.round(totalFluid * 0.28);

  return { totalFluid, sodiumLow, sodiumHigh, potassLow, potassHigh, hours };
}

/* ─── Shared components ─── */
function Btn({ children, onClick, style, variant = 'primary', disabled }) {
  const base = {
    display: 'block', width: '100%', border: 'none',
    cursor: disabled ? 'not-allowed' : 'pointer',
    fontFamily: 'Nunito, sans-serif', fontWeight: 800, fontSize: 17,
    borderRadius: 50, padding: '16px 24px', transition: 'all 0.18s ease',
    opacity: disabled ? 0.5 : 1,
    position: 'relative', overflow: 'hidden',
  };
  const styles = {
    primary:   { background: G.green, color: '#fff' },
    secondary: { background: G.greenLight, color: G.green },
    ghost:     { background: 'transparent', color: G.muted, fontSize: 14, padding: '10px 24px', width: 'auto', fontWeight: 600 },
  };
  return (
    <button style={{ ...base, ...styles[variant], ...style }} onClick={onClick} disabled={disabled}>
      {children}
    </button>
  );
}

function Card({ children, style }) {
  return (
    <div style={{
      background: G.white, borderRadius: 20, padding: '22px 20px',
      border: `1px solid ${G.border}`, ...style,
    }}>
      {children}
    </div>
  );
}

/* ─── SECTION 1: Landing ─── */
function Landing({ onStart }) {
  return (
    <div className="page-enter" style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column', background: G.white }}>
      {/* Hero */}
      <div style={{
        background: `linear-gradient(170deg, ${G.greenDark} 0%, ${G.green} 60%, ${G.greenMid} 100%)`,
        padding: '52px 28px 56px',
        position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', top: -60, right: -60, width: 200, height: 200, borderRadius: '50%', background: 'rgba(255,255,255,0.06)' }} />
        <div style={{ position: 'absolute', bottom: -40, left: -30, width: 150, height: 150, borderRadius: '50%', background: 'rgba(255,255,255,0.05)' }} />

        <div style={{ position: 'relative', zIndex: 1 }}>
          <div style={{ marginBottom: 40 }}>
            <img
              src="assets/hydracaddie-logo.png"
              alt="Hydracaddie"
              style={{ width: '100%', maxWidth: 260, filter: 'brightness(0) invert(1)', opacity: 0.92, marginBottom: 36, display: 'block' }}
            />
          </div>

          <h1 style={{
            fontSize: 34, fontWeight: 900, color: '#fff', lineHeight: 1.15,
            letterSpacing: '-0.5px', marginBottom: 16,
          }}>
            Your personal<br />round hydration<br />plan
          </h1>

          <p style={{ color: 'rgba(255,255,255,0.82)', fontSize: 15.5, lineHeight: 1.55, maxWidth: 300 }}>
            60 seconds. Built on the Galpin equation. Tells you exactly how much to drink across your round.
          </p>

          <div style={{ marginTop: 28, paddingTop: 20, borderTop: '1px solid rgba(255,255,255,0.15)' }}>
            <p style={{ color: 'rgba(255,255,255,0.68)', fontSize: 13, lineHeight: 1.65, fontWeight: 600 }}>
              Just 1-3% body water loss can cut exercise capacity by around 10%. Most golfers play under-hydrated. The Galpin equation tells you exactly what your body needs, based on you and your round.
            </p>
          </div>
        </div>
      </div>

      {/* Content below hero */}
      <div style={{ flex: 1, padding: '36px 28px 40px', display: 'flex', flexDirection: 'column', gap: 28 }}>
        {/* Social proof */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ display: 'flex' }}>
            {['#b0d4bc', '#88bc9a', '#60a47a'].map((c, i) => (
              <div key={i} style={{
                width: 32, height: 32, borderRadius: '50%', background: c,
                border: '2px solid #fff', marginLeft: i ? -8 : 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 13,
              }}>
                {['⛳', '🏴‍☠️', '🏴‍☠️'][i] || '⛳'}
              </div>
            ))}
          </div>
          <p style={{ fontSize: 13.5, color: G.muted, fontWeight: 600 }}>
            Used by <strong style={{ color: G.text }}>{SOCIAL_PROOF_COUNT.toLocaleString('en-GB')}+</strong> golfers
          </p>
        </div>

        {/* Feature pills */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[
            { icon: '⚡', text: 'Takes under 60 seconds' },
            { icon: '🔬', text: 'Based on the Galpin equation' },
            { icon: '🎯', text: 'Personalised to your round' },
          ].map(({ icon, text }) => (
            <div key={text} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{
                width: 36, height: 36, borderRadius: 10, background: G.greenLight,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 18, flexShrink: 0,
              }}>{icon}</div>
              <span style={{ fontSize: 15, fontWeight: 600, color: G.text }}>{text}</span>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 'auto' }}>
          <Btn onClick={onStart} style={{ animation: 'pulse 2.5s infinite', fontSize: 18 }}>
            Start your plan →
          </Btn>
          <p style={{ textAlign: 'center', fontSize: 12.5, color: G.muted, marginTop: 12, fontWeight: 600 }}>
            Free. No account needed.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ─── Handicap Slider ─── */
function HandicapSlider({ value, onChange, onConfirm }) {
  const MIN = -10, MAX = 30;
  const noHandicap = value === 'none';
  const sliderVal = (!value || value === 'none') ? 18 : parseInt(value, 10);

  const displayVal = noHandicap ? null : (sliderVal <= MIN ? `${MIN}` : sliderVal >= MAX ? `${MAX}+` : String(sliderVal));
  const pct = ((sliderVal - MIN) / (MAX - MIN)) * 100;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 24 }}>
      {/* Big number display */}
      <div style={{
        background: noHandicap ? G.greenLight : G.white,
        border: `2px solid ${noHandicap ? G.border : G.green}`,
        borderRadius: 20, padding: '32px 24px', textAlign: 'center',
        transition: 'all 0.2s',
      }}>
        {noHandicap ? (
          <p style={{ fontSize: 22, fontWeight: 800, color: G.muted }}>No handicap</p>
        ) : (
          <>
            <p style={{ fontSize: 64, fontWeight: 900, color: G.green, lineHeight: 1 }}>
              {displayVal}
            </p>
            <p style={{ fontSize: 14, color: G.muted, fontWeight: 700, marginTop: 4 }}>handicap</p>
          </>
        )}
      </div>

      {/* Slider */}
      <div style={{ opacity: noHandicap ? 0.35 : 1, transition: 'opacity 0.2s' }}>
        <input
          type="range"
          min={MIN}
          max={MAX}
          step={1}
          value={sliderVal}
          onChange={e => onChange(String(e.target.value))}
          disabled={noHandicap}
          className="hcp-slider"
          style={{
            background: `linear-gradient(to right, ${G.green} ${pct}%, ${G.border} ${pct}%)`,
          }}
        />
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
          <span style={{ fontSize: 12, color: G.muted, fontWeight: 700 }}>{MIN} (scratch+)</span>
          <span style={{ fontSize: 12, color: G.muted, fontWeight: 700 }}>{MAX}+</span>
        </div>
      </div>

      {/* No handicap toggle */}
      <button
        onClick={() => onChange(noHandicap ? '18' : 'none')}
        style={{
          width: '100%', padding: '14px 20px', borderRadius: 14, cursor: 'pointer',
          border: `2px solid ${noHandicap ? G.green : G.border}`,
          background: noHandicap ? G.greenLight : G.white,
          fontFamily: 'Nunito, sans-serif', fontWeight: 700, fontSize: 15, color: G.text,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          transition: 'all 0.15s',
        }}
      >
        <span>I don't have one yet</span>
        {noHandicap && <span style={{ color: G.green, fontSize: 18 }}>✓</span>}
      </button>

      {/* Confirm */}
      <Btn onClick={() => onConfirm(noHandicap ? 'none' : displayVal)} style={{ marginTop: 'auto' }}>
        Confirm →
      </Btn>
    </div>
  );
}

/* ─── SECTION 2: Quiz ─── */
const QUESTIONS = [
  {
    q: 'How many holes are you playing?',
    opts: ['9 holes', '18 holes'],
    emoji: ['⛳', '⛳⛳'],
  },
  {
    q: 'Walking or in a buggy?',
    opts: ['Walking', 'Buggy'],
    emoji: ['🚶', null],
    buggyOpt: true,
  },
  {
    q: 'How long does your round usually take?',
    opts: ['Around 3 hours', 'Around 4 hours', '5 hours or more', "Not sure (we'll use the average for the round length you picked)"],
    emoji: ['⚡', '🕐', '🐢', '🤷'],
  },
  {
    q: "What's the weather like when you usually play?",
    opts: ['Cool (under 15°C)', 'Mild (15-22°C)', 'Warm (22-28°C)', 'Hot (28°C+)'],
    emoji: ['🧭', '⛅', '☀️', '🥵'],
  },
  {
    q: 'How much do you typically sweat on the course?',
    opts: ['Barely break a sweat', 'Damp shirt by the back nine', 'Soaked through, often'],
    emoji: ['😌', '💦', '🌊'],
  },
  {
    q: 'Roughly what do you weigh?',
    opts: ['60kg or below', '60-70kg', '70-80kg', '80-90kg', '90-100kg', 'Over 100kg'],
    optsLbs: ['132lbs or below', '132-154lbs', '154-176lbs', '176-198lbs', '198-220lbs', 'Over 220lbs'],
    unit: true,
  },
  {
    q: "What's your handicap?",
    handicap: true,
  },
];

function Quiz({ onComplete }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [unit, setUnit] = useState('kg');
  const [dir, setDir] = useState('right');
  const [animKey, setAnimKey] = useState(0);

  const q = QUESTIONS[step];
  const opts = (q.unit && unit === 'lbs') ? q.optsLbs : q.opts;
  const total = QUESTIONS.length;

  function pick(opt) {
    const newAnswers = [...answers.slice(0, step), opt];
    setAnswers(newAnswers);
    if (step < QUESTIONS.length - 1) {
      setDir('right');
      setAnimKey(k => k + 1);
      setTimeout(() => setStep(s => s + 1), 60);
    } else {
      onComplete(newAnswers);
    }
  }

  function back() {
    if (step === 0) return;
    setDir('left');
    setAnimKey(k => k + 1);
    setTimeout(() => setStep(s => s - 1), 60);
  }

  const progressPct = ((step + 1) / total) * 100;

  return (
    <div style={{ width: '100%', minHeight: '100vh', background: G.white, display: 'flex', flexDirection: 'column' }}>
      {/* Top bar */}
      <div style={{ padding: '20px 24px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
          <button
            onClick={back}
            style={{
              background: 'none', border: 'none', cursor: step === 0 ? 'default' : 'pointer',
              opacity: step === 0 ? 0 : 1, padding: 4, color: G.muted, fontSize: 22,
            }}
          >
            ←
          </button>
          <span style={{ fontSize: 13, fontWeight: 700, color: G.muted }}>{step + 1} of {total}</span>
          <img src="assets/hydracaddie-logo.png" alt="Hydracaddie" style={{ height: 22, opacity: 0.7 }} />
        </div>
        {/* Progress bar */}
        <div style={{ height: 5, background: G.greenLight, borderRadius: 10, overflow: 'hidden' }}>
          <div style={{
            height: '100%', background: G.green, borderRadius: 10,
            width: `${progressPct}%`, transition: 'width 0.4s cubic-bezier(.22,.68,0,1.2)',
          }} />
        </div>
      </div>

      {/* Question */}
      <div
        key={animKey}
        className={dir === 'right' ? 'slide-right' : 'slide-left'}
        style={{ flex: 1, padding: '36px 24px 40px', display: 'flex', flexDirection: 'column' }}
      >
        <h2 style={{ fontSize: 26, fontWeight: 900, color: G.text, lineHeight: 1.2, marginBottom: 32, letterSpacing: '-0.3px' }}>
          {q.q}
        </h2>

        {/* Unit toggle for weight */}
        {q.unit && (
          <div style={{ display: 'flex', background: G.greenLight, borderRadius: 50, padding: 4, marginBottom: 20, width: 'fit-content' }}>
            {['kg', 'lbs'].map(u => (
              <button
                key={u}
                onClick={() => setUnit(u)}
                style={{
                  padding: '6px 20px', borderRadius: 50, border: 'none', cursor: 'pointer',
                  fontFamily: 'Nunito, sans-serif', fontWeight: 700, fontSize: 14,
                  background: unit === u ? G.green : 'transparent',
                  color: unit === u ? '#fff' : G.muted,
                  transition: 'all 0.2s',
                }}
              >
                {u}
              </button>
            ))}
          </div>
        )}

        {/* Options or handicap slider */}
        {q.handicap ? (
          <HandicapSlider
            value={answers[step]}
            onChange={val => { const a = [...answers.slice(0, step), val]; setAnswers(a); }}
            onConfirm={val => pick(val)}
          />
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12, flex: 1 }}>
            {opts.map((opt, i) => (
              <button
                key={opt}
                onClick={() => pick(opt)}
                style={{
                  width: '100%', display: 'flex', alignItems: 'center', gap: 14,
                  padding: '18px 20px', borderRadius: 16,
                  border: `2px solid ${answers[step] === opt ? G.green : G.border}`,
                  background: answers[step] === opt ? G.greenLight : G.white,
                  cursor: 'pointer', textAlign: 'left', fontFamily: 'Nunito, sans-serif',
                  fontWeight: 700, fontSize: 16, color: G.text,
                  transition: 'all 0.15s ease',
                }}
              >
                {q.buggyOpt && opt === 'Buggy' ? (
                  <svg width="28" height="22" viewBox="0 0 28 22" fill="none" style={{ flexShrink: 0 }}>
                    <rect x="2" y="1" width="18" height="5" rx="2" fill={G.green} />
                    <rect x="3" y="5" width="2" height="5" rx="1" fill={G.green} />
                    <rect x="17" y="5" width="2" height="5" rx="1" fill={G.green} />
                    <rect x="1" y="9" width="22" height="6" rx="3" fill={G.green} />
                    <rect x="20" y="10" width="6" height="4" rx="2" fill={G.greenMid} />
                    <circle cx="6" cy="18" r="3.5" fill={G.greenDark} />
                    <circle cx="6" cy="18" r="1.5" fill="#fff" />
                    <circle cx="19" cy="18" r="3.5" fill={G.greenDark} />
                    <circle cx="19" cy="18" r="1.5" fill="#fff" />
                    <rect x="8" y="9" width="7" height="3" rx="1.5" fill={G.greenMid} />
                  </svg>
                ) : q.emoji && q.emoji[i] ? (
                  <span style={{ fontSize: 22, lineHeight: 1 }}>{q.emoji[i]}</span>
                ) : null}
                <span style={{ flex: 1 }}>{opt}</span>
                {answers[step] === opt && <span style={{ color: G.green, fontSize: 18 }}>✓</span>}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── SECTION 3: Email Capture ─── */
function EmailCapture({ onSubmit }) {
  const [email, setEmail] = useState('');
  const [consent, setConsent] = useState(false);
  const [error, setError] = useState('');
  const inputRef = useRef(null);
  const canSubmit = consent && email.trim() && /\S+@\S+\.\S+/.test(email);

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 400); }, []);

  function submit() {
    if (!email.trim() || !/\S+@\S+\.\S+/.test(email)) {
      setError('Please enter a valid email address.');
      return;
    }
    if (!consent) { setError('Please tick the box to continue.'); return; }
    onSubmit({ email, consent });
  }

  return (
    <div className="page-enter" style={{ width: '100%', minHeight: '100vh', background: G.white, display: 'flex', flexDirection: 'column' }}>

          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 36, marginBottom: 28,

          Where shall we<br />send your plan?

        <p style={{ fontSize: 15.5, color: G.muted, lineHeight: 1.6, marginBottom: 32 }}>
          Your plan is ready. We'll email it over and add a free golf hydration guide.
        </p>

        {/* Email input */}
        <div style={{ position: 'relative', marginBottom: 8 }}>
          <input
            ref={inputRef}
            type="email"
            placeholder="you@example.com"
            value={email}
            onChange={e => { setEmail(e.target.value); setError(''); }}

              border: `2px solid ${error ? '#e53e3e' : G.border}`,

          {' '}and{' '}

        <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 10 }}>

          <p style={{ textAlign: 'center', fontSize: 12, color: G.muted, fontWeight: 600 }}>
            We respect your inbox. Unsubscribe anytime.

        </div>

}

/* ─── SECTION 4: Results ─── */
function Results({ answers, emailData }) {
  const plan = calcPlan(answers);
  const [expanded, setExpanded] = useState(false);

  const headline =
    plan.totalFluid < 800 ? 'Stay topped up out there.'
    : plan.totalFluid < 1400 ? "You'll need a solid drink strategy."
    : "You're a serious sweater. Hydrate hard.";

  return (
    <div className="page-enter" style={{ width: '100%', background: G.white, minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(145deg, ${G.greenDark} 0%, ${G.green} 100%)`,
        padding: '32px 24px 36px', position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', top: -40, right: -40, width: 160, height: 160, borderRadius: '50%', background: 'rgba(255,255,255,0.07)' }} />
        <img
          src="assets/hydracaddie-logo.png"
          alt="Hydracaddie"
          style={{ width: '100%', maxWidth: 200, filter: 'brightness(0) invert(1)', opacity: 0.85, marginBottom: 28, display: 'block' }}
        />
        <p style={{ color: 'rgba(255,255,255,0.75)', fontSize: 13, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 }}>
          Your round hydration plan
        </p>
        <h2 style={{ color: '#fff', fontSize: 28, fontWeight: 900, lineHeight: 1.2 }}>
          {headline}
        </h2>
        {emailData && (
          <p style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13.5, marginTop: 10, fontWeight: 600 }}>
            Plan sent to {emailData.email}
          </p>
        )}
      </div>

      {/* Cards */}
      <div style={{ padding: '28px 20px', display: 'flex', flexDirection: 'column', gap: 14 }}>

        {/* Card 1: Total fluid */}
        <Card style={{ borderLeft: `4px solid ${G.green}` }}>
          <p style={{ fontSize: 12, fontWeight: 800, color: G.muted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Total fluid for your round</p>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
            <span style={{ fontSize: 52, fontWeight: 900, color: G.green, lineHeight: 1 }}>{plan.totalFluid}</span>
            <span style={{ fontSize: 22, fontWeight: 700, color: G.muted }}>ml</span>
          </div>
          <p style={{ fontSize: 13.5, color: G.muted, marginTop: 6, fontWeight: 600 }}>
            That's roughly {Math.round(plan.totalFluid / 250)} glasses of water over {plan.hours} hours.
          </p>
        </Card>

        {/* Card 2: Electrolytes */}
        <Card>
          <p style={{ fontSize: 12, fontWeight: 800, color: G.muted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 14 }}>Electrolytes you'll lose</p>
          <div style={{ display: 'flex', gap: 16 }}>
            {[
              { label: 'Sodium', low: plan.sodiumLow, high: plan.sodiumHigh, unit: 'mg', color: G.green },
              { label: 'Potassium', low: plan.potassLow, high: plan.potassHigh, unit: 'mg', color: '#2563EB' },
            ].map(({ label, low, high, unit, color }) => (
              <div key={label} style={{ flex: 1, background: G.greenXLight, borderRadius: 14, padding: '14px 16px' }}>
                <p style={{ fontSize: 11.5, fontWeight: 800, color: G.muted, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 4 }}>{label}</p>
                <p style={{ fontSize: 22, fontWeight: 900, color, lineHeight: 1 }}>
                  {low}<span style={{ fontSize: 12, color: G.muted }}>-{high}</span>
                </p>
                <p style={{ fontSize: 11, color: G.muted, fontWeight: 700, marginTop: 2 }}>{unit}</p>
              </div>
            ))}
          </div>
        </Card>

        {/* Checkpoint timeline */}
        <CheckpointTimeline holes={answers[0]} mode={answers[1]} />

        {/* Expandable: How we calculated this */}
        <div style={{ borderRadius: 14, border: `1px solid ${G.border}`, overflow: 'hidden' }}>
          <button
            onClick={() => setExpanded(e => !e)}
            style={{
              width: '100%', padding: '16px 18px', background: G.white, border: 'none', cursor: 'pointer',
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              fontFamily: 'Nunito, sans-serif', fontWeight: 700, fontSize: 14.5, color: G.text,
            }}
          >
            How we calculated this
            <span style={{
              fontSize: 18, display: 'inline-block',
              transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)',
              transition: 'transform 0.2s',
            }}>
              ⌄
            </span>
          </button>

          {expanded && (
            <div style={{ maxHeight: 360, overflowY: 'auto', borderTop: `1px solid ${G.border}` }}>
              {/* Personalised worked example */}
              <div style={{ background: G.greenXLight, padding: '16px 18px', borderBottom: `1px solid ${G.border}` }}>
                <p style={{ fontSize: 12, fontWeight: 800, color: G.green, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Your calculation</p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {[
                    { label: 'Round',      val: answers[0] || '18 holes' },
                    { label: 'Mode',       val: answers[1] || 'Walking' },
                    { label: 'Duration',   val: answers[2] || 'Around 4 hours' },
                    { label: 'Climate',    val: answers[3] || 'Mild (15-22°C)' },
                    { label: 'Sweat rate', val: answers[4] || 'Moderate' },
                    { label: 'Weight',     val: answers[5] || '80-90kg' },
                  ].map(({ label, val }) => (
                    <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                      <span style={{ fontSize: 12.5, color: G.muted, fontWeight: 700 }}>{label}</span>
                      <span style={{ fontSize: 13, color: G.text, fontWeight: 800 }}>{val}</span>
                    </div>
                  ))}
                  <div style={{ borderTop: `1px solid ${G.border}`, marginTop: 8, paddingTop: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                    <span style={{ fontSize: 13, color: G.green, fontWeight: 800 }}>Total fluid</span>
                    <span style={{ fontSize: 20, color: G.green, fontWeight: 900 }}>{plan.totalFluid}ml</span>
                  </div>
                </div>
              </div>

              {/* Science copy */}
              <div style={{ padding: '16px 18px 18px', fontSize: 13.5, color: G.muted, lineHeight: 1.7, fontWeight: 600, display: 'flex', flexDirection: 'column', gap: 10 }}>
                <p>
                  We use the <strong style={{ color: G.text }}>Galpin equation</strong>, a sports-science formula for fluid intake during activity, then adjust it for the conditions of a round of golf.
                </p>
                <p>
                  The base formula is: <strong style={{ color: G.text }}>2ml of fluid per kg of body weight, every 15 minutes of activity.</strong>
                </p>
                <p>From there we apply three adjustments based on your answers:</p>
                <ul style={{ paddingLeft: 18, display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <li><strong style={{ color: G.text }}>Mode of play:</strong> walking burns more energy than riding in a buggy.</li>
                  <li><strong style={{ color: G.text }}>Climate:</strong> hotter conditions raise sweat rate.</li>
                  <li><strong style={{ color: G.text }}>Self-reported sweat rate:</strong> a personal multiplier on top of the climate adjustment.</li>
                </ul>
                <p>
                  Galpin's formula was originally calibrated for running. We apply a golf-specific intensity multiplier to account for the lower energy demand of a round.
                </p>
                <p>
                  Want to read the science? See <a href="https://www.tandfonline.com/doi/abs/10.1080/02640419608727736" target="_blank" rel="noopener noreferrer" style={{ color: G.green }}>Fallowfield et al. (1996), 'Effect of water ingestion on endurance capacity during prolonged running', Journal of Sports Sciences, 14(6), 497-502.</a>
                </p>
              </div>
            </div>
          )}
        </div>

        {/* CTA */}
        <div style={{ marginTop: 8 }}>
          <a href="https://www.hydracaddie.com/collections/electrolyte-powder" target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'none' }}>
            <Btn style={{ fontSize: 17 }}>{CTA_LABEL}</Btn>
          </a>
          <p style={{ textAlign: 'center', fontSize: 12.5, color: G.muted, marginTop: 10, fontWeight: 600 }}>
            Free UK delivery over £15

        </div>

        {/* Footer */}
        <div style={{ paddingTop: 16, borderTop: `1px solid ${G.border}`, marginTop: 4, display: 'flex', justifyContent: 'center' }}>
          <img src="assets/hydracaddie-logo.png" alt="Hydracaddie" style={{ height: 20, opacity: 0.4 }} />
        </div>
      </div>
    </div>
  );
}

/* ─── App shell ─── */
function App() {
  const [screen, setScreen] = useState('landing');
  const [answers, setAnswers] = useState([]);
  const [emailData, setEmailData] = useState(null);

  function handleQuizComplete(ans) {
    setAnswers(ans);
    setScreen('email');
  }

  function handleEmailSubmit(data) {
    setEmailData(data);
    setScreen('results');
  }

  return (
    <div style={{ width: '100%', maxWidth: 430, margin: '0 auto', minHeight: '100vh', position: 'relative' }}>
      {screen === 'landing' && <Landing onStart={() => setScreen('quiz')} />}
      {screen === 'quiz'    && <Quiz onComplete={handleQuizComplete} />}
      {screen === 'email'   && <EmailCapture onSubmit={handleEmailSubmit} />}
      {screen === 'results' && <Results answers={answers} emailData={emailData} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
